<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#faf8f3">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<title>🇹🇭 2026 曼谷自由行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#c89b3c;--bg:#faf8f3;--text:#1d1d1f;--text-light:#86868b;--card-bg:#fff;--border:#e5e5ea;--shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.06);--cat-transport:#5ac8fa;--cat-food:#ff9500;--cat-spot:#34c759;--cat-hotel:#af52de;--cat-default:#e5e5ea}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;overflow-x:hidden}
.header{background:rgba(250,248,243,.92);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);color:var(--text);padding:16px 16px 12px;text-align:center;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(0,0,0,.08)}
@supports(backdrop-filter:blur(1px)){.header{background:rgba(255,253,248,.72)}}
.header h1{font-size:18px;font-weight:800;letter-spacing:-.2px}
.header .sub{font-size:12px;color:var(--text-light);margin-top:3px;font-weight:500}
.tabs{display:flex;position:sticky;top:53px;z-index:99;background:rgba(250,248,243,.92);-webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(0,0,0,.08);overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
@supports(backdrop-filter:blur(1px)){.tabs{background:rgba(255,253,248,.72)}}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:10px 14px;font-size:13px;font-weight:600;color:var(--text-light);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;user-select:none}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:active{background:rgba(0,0,0,.04)}
.content{padding:12px 12px 24px;max-width:600px;margin:0 auto}
.day-view{display:none}
.day-view.active{display:block}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.day-header{padding:20px 4px 12px}
.day-header .date{font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.3px}
.day-header .dtitle{font-size:14px;color:var(--text-light);margin-top:2px;font-weight:500}
.day-header .hotel{font-size:13px;color:var(--text-light);margin-top:4px}
.day-header .hotel::before{content:"🏨 "}
.day-header .warn{font-size:12px;color:#b85c00;background:#fff8ef;border-left:3px solid #f0a030;padding:6px 10px;margin-top:8px;border-radius:0 8px 8px 0;line-height:1.5}
.timeline{position:relative;padding-left:20px}
.timeline::before{content:"";position:absolute;left:8px;top:12px;bottom:12px;width:1.5px;background:var(--border)}
.item{position:relative;margin-bottom:8px}
.item::before{content:"";position:absolute;left:-17px;top:14px;width:10px;height:10px;border-radius:50%;background:var(--cat-default);border:2.5px solid #fff;box-shadow:0 0 0 2px var(--cat-default);z-index:1}
.item[data-cat="transport"]::before{background:var(--cat-transport);box-shadow:0 0 0 2px var(--cat-transport)}
.item[data-cat="food"]::before{background:var(--cat-food);box-shadow:0 0 0 2px var(--cat-food)}
.item[data-cat="spot"]::before{background:var(--cat-spot);box-shadow:0 0 0 2px var(--cat-spot)}
.item[data-cat="hotel"]::before{background:var(--cat-hotel);box-shadow:0 0 0 2px var(--cat-hotel)}
.card{position:relative;background:var(--card-bg);border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);transition:transform .15s,opacity .15s;animation:cardIn .35s ease both}
.card:active{transform:scale(.97);opacity:.85}
.card-transport{background:linear-gradient(135deg,rgba(90,200,250,.06),rgba(90,200,250,.12));border:1px solid rgba(90,200,250,.15)}
.card-food{background:linear-gradient(135deg,rgba(255,149,0,.06),rgba(255,149,0,.12));border:1px solid rgba(255,149,0,.15)}
.card-spot{background:linear-gradient(135deg,rgba(52,199,89,.06),rgba(52,199,89,.12));border:1px solid rgba(52,199,89,.15)}
.card-hotel{background:linear-gradient(135deg,rgba(175,82,222,.06),rgba(175,82,222,.12));border:1px solid rgba(175,82,222,.15)}
.card-header{display:flex;align-items:flex-start;gap:10px;margin-top:4px}
.card-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.card-transport .card-icon{background:rgba(90,200,250,.15)}
.card-food .card-icon{background:rgba(255,149,0,.15)}
.card-spot .card-icon{background:rgba(52,199,89,.15)}
.card-hotel .card-icon{background:rgba(175,82,222,.15)}
.card-body{flex:1;min-width:0}
.card-shop{font-size:15px;font-weight:700;color:var(--text);line-height:1.3}
.card-desc{font-size:12px;color:var(--text-light);margin-top:2px;line-height:1.4}
.route{display:flex;align-items:center;gap:8px;margin:8px 0 4px;padding:4px 0}
.route-from,.route-to{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap}
.route-line{flex:1;height:2px;background:linear-gradient(90deg,var(--cat-transport),rgba(90,200,250,.3),var(--cat-transport));position:relative;border-radius:1px;min-width:20px}
.route-line::before{content:"";position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--cat-transport)}
.route-line::after{content:"";position:absolute;right:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--cat-transport)}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;line-height:1.5}
.card-transport .tag{background:rgba(90,200,250,.12);color:#0077b6}
.card-food .tag{background:rgba(255,149,0,.12);color:#b36b00}
.card-spot .tag{background:rgba(52,199,89,.12);color:#1b7a34}
.card-hotel .tag{background:rgba(175,82,222,.12);color:#7b2d8e}
.tag-default{background:var(--bg);color:var(--text-light)}
.item:nth-child(1) .card{animation-delay:0ms}.item:nth-child(2) .card{animation-delay:30ms}.item:nth-child(3) .card{animation-delay:60ms}.item:nth-child(4) .card{animation-delay:90ms}.item:nth-child(5) .card{animation-delay:120ms}.item:nth-child(6) .card{animation-delay:150ms}.item:nth-child(7) .card{animation-delay:180ms}.item:nth-child(8) .card{animation-delay:210ms}.item:nth-child(9) .card{animation-delay:240ms}.item:nth-child(10) .card{animation-delay:270ms}.item:nth-child(11) .card{animation-delay:300ms}.item:nth-child(12) .card{animation-delay:330ms}
.card .time{font-size:11px;color:var(--text-light);font-weight:700;letter-spacing:.3px}
.card .activity{font-size:14px;font-weight:600;margin:4px 0 2px;line-height:1.4}
.card .activity a{color:var(--text);text-decoration:none;border-bottom:1px dashed var(--accent)}
.card .notes{font-size:11.5px;color:var(--text-light);line-height:1.5;margin-top:4px}
.card .notes .warn-text{color:#b85c00}
.card.has-map{display:flex;align-items:center;overflow:hidden;padding-right:10px}
.card-main{flex:1;min-width:0}
.card-map-btn{display:flex;align-items:center;justify-content:center;width:40px;height:40px;flex-shrink:0;margin-left:6px;border-radius:10px;background:rgba(200,155,60,.06);border:1.5px solid rgba(200,155,60,.12);text-decoration:none;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.card-map-btn svg{width:22px;height:22px;opacity:.5}
.card-map-btn:active{background:rgba(200,155,60,.13);border-color:rgba(200,155,60,.28);box-shadow:0 1px 4px rgba(200,155,60,.15)}
.card-map-btn:active svg{opacity:.85}
.card.has-map .badge{right:52px}
.card-expandable{cursor:pointer}
.card-chevron{display:block;text-align:center;font-size:10px;color:var(--text-light);margin-top:4px;transition:transform .3s ease;line-height:1;opacity:.35}
.card.expanded .card-chevron{transform:rotate(180deg);opacity:.6}
.card-detail{max-height:0;overflow:hidden;opacity:0;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .25s ease .05s}
.card.expanded .card-detail{max-height:600px;opacity:1}
.detail-divider{border:none;height:1px;margin:10px 0 8px;background:linear-gradient(90deg,var(--cat-food),transparent)}
.card-spot .detail-divider{background:linear-gradient(90deg,var(--cat-spot),transparent)}
.detail-hours{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:rgba(0,0,0,.04);color:var(--text);margin-bottom:8px}
.detail-menu-title{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;color:var(--text-light);margin:8px 0 6px}
.detail-menu-title::after{content:"";flex:1;height:1px;background:var(--border)}
.detail-notes{font-size:11.5px;color:var(--text-light);line-height:1.5;margin-top:6px}
.detail-notes .warn-text{color:#b85c00}
.detail-photos{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px 0;margin-top:10px;border-radius:12px;background:linear-gradient(135deg,rgba(255,149,0,.08),rgba(255,149,0,.15));color:#b36b00;font-size:12px;font-weight:600;text-decoration:none;transition:background .15s}
.detail-photos:active{background:rgba(255,149,0,.22)}
.day-subtabs{display:flex;gap:0;background:var(--bg);border-radius:12px;padding:3px;border:1px solid var(--border);margin-bottom:12px}
.day-subtab{flex:1;text-align:center;padding:8px 0;font-size:13px;font-weight:600;color:var(--text-light);border-radius:10px;cursor:pointer;transition:all .2s;user-select:none}
.day-subtab.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.day-subtab:active{opacity:.7}
.tab-section{display:none}
.tab-section.active{display:block}
.meal-group{margin-bottom:20px}
.meal-group-label{font-size:12px;font-weight:700;color:var(--text-light);letter-spacing:.5px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.meal-group-label::after{content:"";flex:1;height:1px;background:var(--border)}
.rest-card{position:relative;background:linear-gradient(135deg,rgba(255,149,0,.06),rgba(255,149,0,.12));border:1px solid rgba(255,149,0,.15);border-radius:16px;padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);animation:cardIn .35s ease both}
.rest-card.has-map{display:flex;align-items:center;overflow:hidden;padding-right:10px}
.rest-card-main{flex:1;min-width:0}
.rest-name{font-size:16px;font-weight:700;color:var(--text);line-height:1.3}
.rest-oneliner{font-size:13px;color:var(--text-light);margin-top:2px;line-height:1.4}
.rest-meta{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.rest-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;line-height:1.5;background:rgba(255,149,0,.12);color:#b36b00}
.rest-bottom{display:flex;align-items:center;gap:12px;margin-top:8px;font-size:11.5px;color:var(--text-light)}
.rest-hours{display:inline-flex;align-items:center;gap:3px}
.rest-price{display:inline-flex;align-items:center;gap:3px;font-weight:600;color:#b36b00}
.rest-warn{font-size:11px;color:#b85c00;margin-top:6px}
.rest-nospicy{font-size:11px;color:#1b7a34;margin-top:4px;background:rgba(52,199,89,.08);padding:4px 8px;border-radius:8px;line-height:1.5}
.meal-empty{padding:20px 16px;text-align:center;font-size:13px;color:var(--text-light);border:1.5px dashed var(--border);border-radius:16px;margin-bottom:8px}
.snack-section .rest-card{padding:10px 12px}
.snack-section .rest-name{font-size:14px}
.snack-section .rest-oneliner{font-size:12px}
.rest-card .badge{position:absolute;top:6px;right:8px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;cursor:pointer}
.rest-card.has-map .badge{right:52px}
.rest-card.has-alts{cursor:pointer}
.card.compact{padding:8px 14px}
.card.compact .activity{font-size:12px;font-weight:500;color:var(--text-light)}
.budget{background:var(--card-bg);border-radius:16px;padding:14px 16px;margin-top:16px;box-shadow:var(--shadow)}
.budget h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px}
.budget table{width:100%;font-size:12px;border-collapse:collapse}
.budget td{padding:4px 0}
.budget td:last-child{text-align:right;font-family:'SF Mono',Menlo,'Courier New',monospace;font-size:11.5px;white-space:nowrap}
.budget tr.total td{border-top:1.5px dashed var(--border);padding-top:8px;font-weight:700;color:var(--accent)}
.badge{position:absolute;top:6px;right:8px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;cursor:pointer}
.card.has-alts{cursor:pointer}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;opacity:0;transition:opacity .25s}
.overlay.show{opacity:1}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:201;background:#fff;border-radius:16px 16px 0 0;max-height:70vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .25s ease-out;box-shadow:0 -4px 20px rgba(0,0,0,.1)}
.sheet.show{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#d1d1d6;border-radius:2px;margin:10px auto 0}
.sheet-head{display:flex;align-items:center;padding:12px 16px 8px;border-bottom:1px solid var(--border)}
.sheet-title{flex:1;font-size:14px;font-weight:700;color:var(--text)}
.sheet-close{width:28px;height:28px;border:none;background:var(--bg);border-radius:50%;font-size:16px;color:var(--text-light);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
.sheet-close:active{background:#d1d1d6}
.sheet-body{overflow-y:auto;padding:12px 16px 24px;-webkit-overflow-scrolling:touch}
.sheet-body .rest-card{box-shadow:none;background:linear-gradient(135deg,rgba(255,149,0,.04),rgba(255,149,0,.08))}
.alt-card{background:var(--bg);border-radius:14px;padding:12px 14px;margin-bottom:10px}
.alt-card:last-child{margin-bottom:0}
.alt-name{font-size:14px;font-weight:700;color:var(--text)}
.alt-feat{font-size:12px;color:var(--accent);margin-top:2px}
.alt-detail{font-size:11px;color:var(--text-light);margin-top:6px;line-height:1.6}
.alt-detail span{display:block}
.alt-warn{font-size:11px;color:#b85c00;margin-top:4px}
.alt-map{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:var(--accent);margin-top:6px;text-decoration:none;padding:3px 8px;background:#fff;border-radius:20px;font-weight:500}
.dash-section{background:var(--card-bg);border-radius:16px;padding:14px 16px;margin-bottom:12px;box-shadow:var(--shadow)}
.dash-section h3{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px}
.dash-warn{font-size:12px;color:#b85c00;background:#fff8ef;border-left:3px solid #f0a030;padding:6px 10px;margin-bottom:6px;border-radius:0 8px 8px 0;line-height:1.5}
.dash-warn:last-child{margin-bottom:0}
.dash-table{width:100%;font-size:12px;border-collapse:collapse}
.dash-table td{padding:4px 0}
.dash-table td:last-child{text-align:right;font-family:'SF Mono',Menlo,'Courier New',monospace;font-size:11.5px;white-space:nowrap}
.dash-table tr.total td{border-top:1.5px dashed var(--border);padding-top:8px;font-weight:700;color:var(--accent)}
.calc-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.calc-label{font-size:14px;font-weight:700;width:36px;text-align:right}
.calc-input{flex:1;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:16px;font-family:'SF Mono',Menlo,'Courier New',monospace;outline:none;transition:border-color .2s;-webkit-appearance:none;background:#fff}
.calc-input:focus{border-color:var(--accent)}
.calc-arrow{text-align:center;font-size:16px;color:var(--accent);margin:-4px 0 -4px 44px}
.rate-status{font-size:11px;color:var(--text-light);margin-top:8px;display:flex;align-items:center;gap:4px}
.rate-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.rate-dot.online{background:#34c759}
.rate-dot.cached{background:#ff9500}
.rate-dot.fallback{background:#d1d1d6}
/* No-spicy guide */
.nospicy-phrase{background:linear-gradient(135deg,rgba(200,155,60,.06),rgba(200,155,60,.12));border:1px solid rgba(200,155,60,.15);border-radius:14px;padding:12px 14px;margin-bottom:8px}
.nospicy-thai{font-size:18px;font-weight:700;color:var(--text);line-height:1.4}
.nospicy-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:4px}
.nospicy-cn{font-size:13px;color:var(--text-light)}
.nospicy-en{font-size:11px;color:var(--accent);font-weight:600}
.nospicy-foods{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.nospicy-food{background:rgba(52,199,89,.06);border:1px solid rgba(52,199,89,.12);border-radius:10px;padding:8px 10px;font-size:12px;font-weight:600;color:#1b7a34;text-align:center}
.footer{text-align:center;padding:20px;font-size:11px;color:var(--text-light)}
/* Translate */
.tr-setup{text-align:center;padding:32px 16px}
.tr-setup p{font-size:13px;color:var(--text-light);margin-bottom:12px;line-height:1.6}
.tr-key-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;font-family:'SF Mono',Menlo,'Courier New',monospace;outline:none;background:#fff;transition:border-color .2s;margin-bottom:10px}
.tr-key-input:focus{border-color:var(--accent)}
.tr-save-btn,.tr-send-btn,.tr-copy-btn,.tr-reset-btn{border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
.tr-save-btn{background:var(--accent);color:#fff;width:100%}
.tr-save-btn:active{opacity:.7}
.tr-area{padding:0}
.tr-input-wrap{position:relative;margin-bottom:10px}
.tr-input{width:100%;min-height:80px;border:1.5px solid var(--border);border-radius:14px;padding:12px 14px;font-size:15px;font-family:inherit;outline:none;resize:none;background:#fff;transition:border-color .2s;line-height:1.5}
.tr-input:focus{border-color:var(--accent)}
.tr-send-btn{background:var(--accent);color:#fff;width:100%;margin-bottom:8px}
.tr-send-btn:active{opacity:.7}
.tr-send-btn:disabled{background:var(--border);color:var(--text-light);cursor:default}
.tr-result-box{background:linear-gradient(135deg,rgba(200,155,60,.06),rgba(200,155,60,.14));border:1px solid rgba(200,155,60,.2);border-radius:14px;padding:16px;min-height:60px;margin-bottom:8px}
.tr-result-thai{font-size:17px;font-weight:700;color:var(--text);line-height:1.6;word-break:break-word}
.tr-result-roman{font-size:13px;color:var(--text-light);margin-top:6px;line-height:1.5}
.tr-result-placeholder{font-size:14px;color:var(--text-light);text-align:center;padding:12px 0}
.tr-copy-btn{background:rgba(200,155,60,.12);color:var(--accent);width:100%;margin-bottom:6px}
.tr-copy-btn:active{background:rgba(200,155,60,.25)}
.tr-reset-btn{background:none;color:var(--text-light);font-size:12px;width:100%;margin-top:8px;padding:6px}
.tr-reset-btn:active{color:var(--accent)}
.tr-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.map-wrap{border-radius:14px;overflow:hidden;border:1.5px solid rgba(200,155,60,.25);box-shadow:var(--shadow);margin-bottom:12px}
.map-sm{height:180px;width:100%}
.map-lg{height:350px;width:100%}
.leaflet-popup-content{font-family:inherit;font-size:13px;line-height:1.5;min-width:140px}
.leaflet-popup-content b{font-size:14px}
.map-nav-btn{display:inline-block;margin-top:6px;padding:4px 12px;background:var(--accent);color:#fff;border-radius:8px;text-decoration:none;font-size:12px;font-weight:600}
.map-nav-btn:active{opacity:.7}
.map-legend{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;font-size:11px;color:var(--text-light);margin-top:8px}

const MAP_COLORS={food:'#ff9500',spot:'#34c759',spa:'#5ac8fa',hotel:'#af52de',bar:'#c89b3c'};

function createMapIcon(color){
  return L.divIcon({className:'',html:`<div style="width:22px;height:22px;border-radius:50%;background:${color};border:2.5px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35)"></div>`,iconSize:[22,22],iconAnchor:[11,11],popupAnchor:[0,-13]});
}
function addMapMarkers(map,places){
  const group=[];
  places.forEach(p=>{
    const color=MAP_COLORS[p.cat]||'#999';
    const navUrl=mapUrl(p.mq);
    const popup=`<b>Day${p.day} ${p.name}</b><br><span style="color:#666">${p.info}</span><br><a class="map-nav-btn" href="${navUrl}" target="_blank" rel="noopener">📍 導航</a>`;
    L.marker([p.lat,p.lng],{icon:createMapIcon(color)}).addTo(map).bindPopup(popup);
    group.push([p.lat,p.lng]);
  });
  if(group.length>1)map.fitBounds(group,{padding:[25,25]});
  else if(group.length===1)map.setView(group[0],15);
}
function mapLegendHtml(){
  return `<div class="map-legend">
    <div class="map-legend-item"><div class="map-legend-dot" style="background:#ff9500"></div>餐廳</div>
    <div class="map-legend-item"><div class="map-legend-dot" style="background:#34c759"></div>景點</div>
    <div class="map-legend-item"><div class="map-legend-dot" style="background:#5ac8fa"></div>按摩</div>
    <div class="map-legend-item"><div class="map-legend-dot" style="background:#af52de"></div>飯店</div>
    <div class="map-legend-item"><div class="map-legend-dot" style="background:#c89b3c"></div>酒吧</div>
  </div>`;
}
const _maps={};
function initMap(containerId,places,size){
  if(_maps[containerId]){_maps[containerId].invalidateSize();return;}
  const el=document.getElementById(containerId);
  if(!el||el.offsetParent===null)return;
  const map=L.map(containerId,{scrollWheelZoom:true,dragging:true,zoomControl:size==='lg'}).setView([13.745,100.535],12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:18}).addTo(map);
  addMapMarkers(map,places);
  // Locate button
  const locBtn=document.createElement('button');
  locBtn.className='map-locate-btn';
  locBtn.innerHTML='📍';
  locBtn.title='顯示我的位置';
  el.style.position='relative';
  el.appendChild(locBtn);
  let locMarker=null,locCircle=null;
  locBtn.addEventListener('click',()=>{
    if(!navigator.geolocation){alert('你的瀏覽器不支援定位');return;}
    locBtn.classList.add('locating');
    navigator.geolocation.getCurrentPosition(pos=>{
      locBtn.classList.remove('locating');
      const lat=pos.coords.latitude,lng=pos.coords.longitude,acc=pos.coords.accuracy;
      if(locMarker){map.removeLayer(locMarker);map.removeLayer(locCircle);}
      locMarker=L.marker([lat,lng],{icon:L.divIcon({className:'',html:'<div class="leaflet-loc-dot"></div>',iconSize:[14,14],iconAnchor:[7,7]})}).addTo(map).bindPopup('📍 你在這裡');
      locCircle=L.circle([lat,lng],{radius:acc,color:'#007aff',fillColor:'#007aff',fillOpacity:.1,weight:1}).addTo(map);
      map.setView([lat,lng],15);
      locMarker.openPopup();
    },err=>{
      locBtn.classList.remove('locating');
      alert('定位失敗：'+(err.code===1?'請允許位置存取權限':err.code===2?'無法取得位置':'定位逾時'));
    },{enableHighAccuracy:true,timeout:10000});
  });
  _maps[containerId]=map;
}

function mapUrl(q){return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`}
function getCat(a){
  if(/[✈🚃🚇🚌🚡🚕🚢🚶🚻]/u.test(a))return 'transport';
  if(/[🍽🍛🍖🍣🍰🍦🍳🛒🌽🍥🍨🍹🍵☕]/u.test(a))return 'food';
  if(/[📸🏛🎵🌸🌷🌃🎆♨📝🛍💆]/u.test(a))return 'spot';
  if(/[🏨🛁]/u.test(a))return 'hotel';
  return '';
}
function extractEmoji(s){const m=s.match(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/u);return m?m[0]:''}
function renderTags(tags){if(!tags||!tags.length)return '';return '<div class="tags">'+tags.map(t=>`<span class="tag">${t}</span>`).join('')+'</div>'}
function warnN(n){return n?`<div class="notes">${n.replace(/⚠️/g,'<span class="warn-text">⚠️</span>')}</div>`:''}
function detailN(n){return n?`<div class="detail-notes">${n.replace(/⚠️/g,'<span class="warn-text">⚠️</span>')}</div>`:''}
function renderFoodDetail(it){
  let h='<div class="card-detail"><hr class="detail-divider">';

  if(it.tags&&it.tags.length)h+=renderTags(it.tags);
  h+=detailN(it.n);
  if(it.m)h+=`<a class="detail-photos" href="${mapUrl(it.m)}" target="_blank" rel="noopener">📷 Google Maps 查看 →</a>`;
  return h+'</div>';
}
function renderSpotDetail(it){
  let h='<div class="card-detail"><hr class="detail-divider">';
  if(it.hours)h+=`<div class="detail-hours">🕐 ${it.hours}</div>`;
  if(it.tags&&it.tags.length)h+=renderTags(it.tags);
  h+=detailN(it.n);
  return h+'</div>';
}
function mainOpen(m){return m?'<div class="card-main">':''}
function mainClose(m){return m?'</div>':''}
function mapBtn(m){return m?`<a class="card-map-btn" href="${mapUrl(m)}" target="_blank" rel="noopener" aria-label="Google Maps"><svg viewBox="0 0 24 24" fill="none" stroke="#c89b3c" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="9.5"/><ellipse cx="12" cy="12" rx="4" ry="9.5"/><path d="M3.5 8.5h17M3.5 15.5h17"/></svg></a>`:''}
function cardOpen(cls,it,dayNum,idx){const ha=it.alts&&it.alts.length>0;const hm=!!it.m;return `<div class="card ${cls}${it.c?' compact':''}${ha?' has-alts':''}${hm?' has-map':''}"${ha?` data-day="${dayNum}" data-idx="${idx}"`:''}>` + (ha?`<div class="badge">+${it.alts.length}</div>`:'')}

function renderTransportRoute(it,dayNum,idx){

  const allTags=[it.dur,...(it.tags||[])];
  h+=renderTags(allTags);
  h+=warnN(it.n)+mainClose(it.m)+mapBtn(it.m)+`</div>`;
  return h;
}
function renderTransportSimple(it,dayNum,idx){
  let h=cardOpen('card-transport',it,dayNum,idx)+mainOpen(it.m);

  h+=warnN(it.n)+renderTags(it.tags)+mainClose(it.m)+mapBtn(it.m)+`</div>`;
  return h;
}
function renderFoodCard(it,dayNum,idx){
  const e=extractEmoji(it.a);

  h+=`<div class="time">${it.t}</div>`;

function renderFoodSimple(it,dayNum,idx){

  h+=warnN(it.n)+renderTags(it.tags)+mainClose(it.m)+mapBtn(it.m)+`</div>`;

}
function renderSpotCard(it,dayNum,idx){
  const e=extractEmoji(it.a);
  const hasDetail=it.hours||it.n;

  h+=`<div class="time">${it.t}</div>`;

function renderHotelCard(it,dayNum,idx){
  const e=extractEmoji(it.a);
  let h=cardOpen('card-hotel',it,dayNum,idx)+mainOpen(it.m);
  h+=`<div class="time">${it.t}</div>`;
  h+=`<div class="card-header">`;

function renderDefaultCard(it,dayNum,idx){
  let h=cardOpen('',it,dayNum,idx)+mainOpen(it.m);

  h+=warnN(it.n)+mainClose(it.m)+mapBtn(it.m)+`</div>`;

}
function renderCard(it,cat,dayNum,idx){
  switch(cat){
    case 'transport':return it.from&&it.to?renderTransportRoute(it,dayNum,idx):renderTransportSimple(it,dayNum,idx);
    case 'food':return it.shop?renderFoodCard(it,dayNum,idx):renderFoodSimple(it,dayNum,idx);
    case 'spot':return renderSpotCard(it,dayNum,idx);
    case 'hotel':return renderHotelCard(it,dayNum,idx);
    default:return renderDefaultCard(it,dayNum,idx);
  }
}

function renderMealTab(d){
  const mealItems={};
  d.items.forEach((it,idx)=>{if(it.meal){(mealItems[it.meal]=mealItems[it.meal]||[]).push({it,idx});}});
  const mealOrder=[{key:'朝',label:'🌅 早餐'},{key:'昼',label:'🌞 午餐'},{key:'夜',label:'🌙 晚餐'}];
  let html='';
  mealOrder.forEach(m=>{
    html+=`<div class="meal-group"><div class="meal-group-label">${m.label}</div>`;
    const items=mealItems[m.key]||[];
    if(items.length===0){
      html+=`<div class="meal-empty">未安排 · 行程中自由覓食</div>`;
    }else{
      items.forEach(({it,idx})=>{html+=renderRestaurantCard(it,d.day,idx);});
    }
    html+=`</div>`;
  });
  const snacks=mealItems['小吃']||[];
  if(snacks.length>0){
    html+=`<div class="meal-group snack-section"><div class="meal-group-label">🍡 小吃・飲品</div>`;
    snacks.forEach(({it,idx})=>{html+=renderRestaurantCard(it,d.day,idx);});
    html+=`</div>`;
  }
  return html;
}

function render(){
  const tabs=document.getElementById('tabs');
  const content=document.getElementById('content');

  tabs.innerHTML=`<div class="tab" data-day="0">🏠<br><span style="font-size:10px;font-weight:400">總覽</span></div>`+DAYS.map(d=>
    `<div class="tab" data-day="${d.day}">Day ${d.day}<br><span style="font-size:10px;font-weight:400">${d.date.slice(0,5)}</span></div>`
  ).join('');

  content.innerHTML=`<div class="day-view" id="day0"></div>`+
  DAYS.map(d=>{
    let html=`<div class="day-view" id="day${d.day}">`;
    html+=`<div class="day-header"><div class="date">Day ${d.day} — ${d.date}</div><div class="dtitle">${d.title}</div>`;
    if(d.hotel)html+=`<div class="hotel">${d.hotel}</div>`;
    d.warns.forEach(w=>html+=`<div class="warn">⚠️ ${w}</div>`);
    html+=`</div>`;
    html+=`<div class="map-wrap"><div class="map-sm" id="daymap${d.day}"></div></div>${mapLegendHtml()}`;
    html+=`<div class="day-subtabs"><div class="day-subtab active" data-subtab="itinerary">🗓 行程</div><div class="day-subtab" data-subtab="meals">🍽 三餐</div></div>`;
    html+=`<div class="tab-section active" data-section="itinerary">`;
    html+=`<div class="timeline">`;
    d.items.forEach((it,idx)=>{
      if(it.meal)return;
      const cat=getCat(it.a);
      html+=`<div class="item"${cat?` data-cat="${cat}"`:''}>`;
      html+=renderCard(it,cat,d.day,idx);
      html+=`</div>`;
    });
    html+=`</div>`;
    if(d.budget){
      html+=`<div class="budget"><h3>💰 費用概算（5人）</h3><table>`;
      d.budget.forEach((b,i,a)=>{
        const cls=i===a.length-1?' class="total"':'';
        html+=`<tr${cls}><td>${b[0]}</td><td>${b[1]}</td></tr>`;
      });
      html+=`</table></div>`;
    }
    html+=`</div>`;
    html+=`<div class="tab-section" data-section="meals">${renderMealTab(d)}</div>`;
    html+=`</div>`;
    return html;
  }).join('');

  let active=0;
  function setDay(n){
    active=n;
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',+t.dataset.day===n));
    document.querySelectorAll('.day-view').forEach(v=>v.classList.toggle('active',v.id===`day${n}`));
    if(n===0&&!_dashRendered)renderDashboard();
    const dv=document.getElementById(`day${n}`);
    if(dv){
      const firstSub=dv.querySelector('.day-subtab');
      const firstSec=firstSub?firstSub.dataset.subtab:null;
      dv.querySelectorAll('.day-subtab').forEach((t,i)=>t.classList.toggle('active',i===0));
      if(firstSec)dv.querySelectorAll('.tab-section').forEach(s=>s.classList.toggle('active',s.dataset.section===firstSec));
    }
    const at=document.querySelector('.tab.active');
    if(at)at.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
    window.scrollTo({top:0,behavior:'smooth'});
    // Init day map after view is visible
    if(n>0){
      setTimeout(()=>{
        const dayPlaces=PLACES.filter(p=>p.day===n);
        if(dayPlaces.length)initMap('daymap'+n,dayPlaces,'sm');
      },100);
    }
  }
  tabs.addEventListener('click',e=>{
    const tab=e.target.closest('.tab');
    if(tab)setDay(+tab.dataset.day);
  });

  let sx=0,sy=0;
  content.addEventListener('touchstart',e=>{
    if(e.target.closest('.map-wrap'))return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
  },{passive:true});
  content.addEventListener('touchend',e=>{
    if(e.target.closest('.map-wrap'))return;
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0&&active<6)setDay(active+1);
      else if(dx>0&&active>0)setDay(active-1);
    }
  },{passive:true});

  content.addEventListener('click',e=>{
    const subtab=e.target.closest('.day-subtab');
    if(subtab){
      const dv=subtab.closest('.day-view');
      if(!dv)return;
      dv.querySelectorAll('.day-subtab').forEach(t=>t.classList.remove('active'));
      subtab.classList.add('active');
      const sec=subtab.dataset.subtab;
      dv.querySelectorAll('.tab-section').forEach(s=>s.classList.toggle('active',s.dataset.section===sec));
      // Init dashboard map when switching to map tab
      if(sec==='map')setTimeout(()=>initMap('dashmap',PLACES,'lg'),100);
      return;
    }
    if(e.target.closest('a'))return;
    const badge=e.target.closest('.badge');
    if(badge){const card=badge.closest('[data-day]');if(card){const day=+card.dataset.day,idx=+card.dataset.idx;const it=DAYS.find(d=>d.day===day).items[idx];if(it&&it.alts)openSheet(it.alts,it.a);}return;}
    const exp=e.target.closest('.card-expandable');
    if(exp){exp.classList.toggle('expanded');return;}
    const alt=e.target.closest('.has-alts');
    if(alt&&alt.dataset.day){const day=+alt.dataset.day,idx=+alt.dataset.idx;const it=DAYS.find(d=>d.day===day).items[idx];if(it&&it.alts)openSheet(it.alts,it.a);}
  });

  const today=new Date();
  const dayMap={18:1,19:2,20:3,21:4,22:5,23:6};
  const autoDay=(today.getFullYear()===2026&&today.getMonth()===6)?dayMap[today.getDate()]||0:0;
  setDay(autoDay);
}

/* Dashboard */
let currentRate=FALLBACK_RATE;
let rateSource='fallback';
let rateTime='';

async function fetchRate(){
  const cached=localStorage.getItem('thb_rate');
  const cachedTime=localStorage.getItem('thb_rate_time');
  if(cached){currentRate=+cached;rateSource='cached';rateTime=cachedTime||'';}
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/THB');
    const j=await r.json();
    if(j.result==='success'&&j.rates&&j.rates.TWD){
      currentRate=j.rates.TWD;
      rateSource='online';
      rateTime=new Date().toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      localStorage.setItem('thb_rate',currentRate);
      localStorage.setItem('thb_rate_time',rateTime);
    }
  }catch(e){}
  updateRateUI();
}

function updateRateUI(){
  const el=document.getElementById('rate-status');
  if(!el)return;
  const dotCls=rateSource==='online'?'online':rateSource==='cached'?'cached':'fallback';
  const label=rateSource==='online'?`線上即時 · ${rateTime}`:rateSource==='cached'?`離線快取 · ${rateTime}`:'預設匯率（無快取）';
  el.innerHTML=`<span class="rate-dot ${dotCls}"></span>${label}`;
  const rateVal=document.getElementById('rate-value');
  if(rateVal)rateVal.textContent=currentRate.toFixed(4);
  const thbInput=document.getElementById('calc-thb');
  if(thbInput&&thbInput.value)calcFromThb();
}

function calcFromThb(){
  const v=parseFloat(document.getElementById('calc-thb').value)||0;
  document.getElementById('calc-twd').value=v?Math.round(v*currentRate):'';
}
function calcFromTwd(){
  const v=parseFloat(document.getElementById('calc-twd').value)||0;
  document.getElementById('calc-thb').value=v?Math.round(v/currentRate):'';
}

/* Translate */
const TR_KEY_LS='gemini_api_key';
function getGeminiKey(){return localStorage.getItem(TR_KEY_LS)||'';}
function setGeminiKey(k){localStorage.setItem(TR_KEY_LS,k);}
function clearGeminiKey(){localStorage.removeItem(TR_KEY_LS);}

function renderTranslateUI(){
  const container=document.getElementById('tr-container');
  if(!container)return;
  const key=getGeminiKey();
  if(!key){
    container.innerHTML=`<div class="tr-setup">
      <h3 style="font-size:13px;font-weight:700;margin-bottom:12px">🔤 中泰即時翻譯</h3>
      <p>首次使用需輸入 Gemini API Key<br>（免費申請，由旅伴提供）</p>
      <input class="tr-key-input" id="tr-key-field" type="password" placeholder="貼上 Gemini API Key">
      <button class="tr-save-btn" id="tr-save-btn">儲存並開始使用</button>
    </div>`;
    document.getElementById('tr-save-btn').addEventListener('click',()=>{
      const v=document.getElementById('tr-key-field').value.trim();
      if(!v)return;
      setGeminiKey(v);
      renderTranslateUI();
    });
    return;
  }
  container.innerHTML=`<h3 style="font-size:13px;font-weight:700;margin-bottom:10px">🔤 中文 → 泰文翻譯</h3>
    <div class="tr-area">
      <div class="tr-input-wrap"><textarea class="tr-input" id="tr-input" placeholder="輸入中文，例如：這個不要辣" rows="3" maxlength="200"></textarea><div style="text-align:right;font-size:10px;color:var(--text-light);margin-top:2px"><span id="tr-charcount">0</span>/200</div></div>
      <button class="tr-send-btn" id="tr-send-btn">翻譯</button>
      <div class="tr-result-box" id="tr-result-box"><div class="tr-result-placeholder">翻譯結果將顯示在這裡</div></div>
      <button class="tr-copy-btn" id="tr-copy-btn" style="display:none">📋 複製泰文</button>
      <div style="font-size:10px;color:var(--text-light);text-align:center;margin-top:8px">⚡ 每日共 250 次（5人共用 = 每人約 50 次/天）</div>
      <button class="tr-reset-btn" id="tr-reset-btn">重設 API Key</button>
    </div>`;
  const input=document.getElementById('tr-input');
  const sendBtn=document.getElementById('tr-send-btn');
  const resultBox=document.getElementById('tr-result-box');
  const copyBtn=document.getElementById('tr-copy-btn');
  let lastThai='';

  sendBtn.addEventListener('click',async()=>{
    const text=input.value.trim();
    if(!text)return;
    sendBtn.disabled=true;
    sendBtn.innerHTML='<span class="tr-spinner"></span>翻譯中…';
    resultBox.innerHTML='<div class="tr-result-placeholder">翻譯中…</div>';
    copyBtn.style.display='none';
    try{
      const res=await callGemini(text);
      lastThai=res.thai||'';
      let html=`<div class="tr-result-thai">${res.thai||'（無結果）'}</div>`;
      if(res.romanization)html+=`<div class="tr-result-roman">🔊 ${res.romanization}</div>`;
      resultBox.innerHTML=html;
      if(lastThai)copyBtn.style.display='block';
    }catch(e){
      resultBox.innerHTML=`<div class="tr-result-placeholder" style="color:#b85c00">翻譯失敗：${e.message}</div>`;
    }
    sendBtn.disabled=false;
    sendBtn.textContent='翻譯';
  });

  // Char counter
  const charcount=document.getElementById('tr-charcount');
  input.addEventListener('input',()=>{charcount.textContent=input.value.length;});
  // Enter key to send
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendBtn.click();}
  });

  copyBtn.addEventListener('click',()=>{
    if(!lastThai)return;
    navigator.clipboard.writeText(lastThai).then(()=>{
      copyBtn.textContent='✅ 已複製';
      setTimeout(()=>{copyBtn.textContent='📋 複製泰文';},1500);
    }).catch(()=>{});
  });

  document.getElementById('tr-reset-btn').addEventListener('click',()=>{
    if(confirm('確定要重設 API Key？')){clearGeminiKey();renderTranslateUI();}
  });
}

async function callGemini(text){
  const key=getGeminiKey();
  if(!key)throw new Error('未設定 API Key');
  const url=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`;
  const body={
    contents:[{parts:[{text:`你是旅遊翻譯助手。將以下中文翻譯成泰文，並提供羅馬拼音（方便發音）。
請用以下 JSON 格式回覆（不要加 markdown）：
{"thai":"泰文翻譯","romanization":"羅馬拼音"}

情境：在泰國曼谷旅遊，對話對象是店員/司機/服務生，語氣要禮貌自然。

中文：${text}`}]}],
    generationConfig:{temperature:0.3,maxOutputTokens:1024,thinkingConfig:{thinkingBudget:0}}
  };
  const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){
    const err=await r.json().catch(()=>({}));
    throw new Error(err.error?.message||`HTTP ${r.status}`);
  }
  const j=await r.json();
  const raw=j.candidates?.[0]?.content?.parts?.[0]?.text||'';
  // Parse JSON from response (handle possible markdown wrapping)
  const cleaned=raw.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
  try{return JSON.parse(cleaned);}catch(e){
    // Fallback: treat entire response as Thai text
    return {thai:raw.trim(),romanization:''};
  }
}

/* Bottom Sheet */
let _sheetOverlay=null,_sheetEl=null;
function openSheet(alts,title){
  closeSheet(true);
  const overlay=document.createElement('div');
  overlay.className='overlay';
  const sheet=document.createElement('div');
  sheet.className='sheet';
  let body='';
  alts.forEach(a=>{body+=renderSheetAltCard(a);});
  sheet.innerHTML=`<div class="sheet-handle"></div><div class="sheet-head"><div class="sheet-title">備選方案</div><button class="sheet-close">✕</button></div><div class="sheet-body">${body}</div>`;
  document.body.appendChild(overlay);
  document.body.appendChild(sheet);
  _sheetOverlay=overlay;_sheetEl=sheet;
  requestAnimationFrame(()=>{overlay.classList.add('show');sheet.classList.add('show')});
  overlay.addEventListener('click',closeSheet);
  sheet.querySelector('.sheet-close').addEventListener('click',closeSheet);
  let ty=0;
  sheet.addEventListener('touchstart',e=>{ty=e.touches[0].clientY},{passive:true});
  sheet.addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-ty>80)closeSheet()},{passive:true});
}
function closeSheet(immediate){
  const o=_sheetOverlay,s=_sheetEl;
  _sheetOverlay=null;_sheetEl=null;
  if(!o&&!s)return;
  if(immediate){if(o)o.remove();if(s)s.remove();return;}
  if(o)o.classList.remove('show');
  if(s)s.classList.remove('show');
  setTimeout(()=>{if(o)o.remove();if(s)s.remove()},250);
}

  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
